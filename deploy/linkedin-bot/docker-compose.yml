services:
  linkedin-bot:
    image: ${LINKEDIN_BOT_IMAGE:-curriculosis-linkedin-bot:local}
    build:
      context: ../..
      dockerfile: deploy/linkedin-bot/Dockerfile
    container_name: curriculosis-linkedin-bot
    restart: unless-stopped
    environment:
      LOOPBACK_URL: ${LOOPBACK_URL}
      LINKEDIN_USER: ${LINKEDIN_USER}
      LINKEDIN_PASSWORD: ${LINKEDIN_PASSWORD}
      LINKEDIN_HEADLESS: ${LINKEDIN_HEADLESS:-true}
      LINKEDIN_CHROME_USER_DATA_DIR: ${LINKEDIN_CHROME_USER_DATA_DIR:-/home/seluser/chrome-profile}
      LINKEDIN_CHROME_PROFILE: ${LINKEDIN_CHROME_PROFILE:-Default}
      LINKEDIN_CHECKPOINT_TIMEOUT_SECONDS: ${LINKEDIN_CHECKPOINT_TIMEOUT_SECONDS:-300}
      SELENIUM_REMOTE_URL: ${SELENIUM_REMOTE_URL:-}
      CHROMEDRIVER_PATH: ${CHROMEDRIVER_PATH:-}
      JAVA_OPTS: ${JAVA_OPTS:-}
    volumes:
      - ./linkedin_chrome_profile:/home/seluser/chrome-profile

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: curriculosis-selenium
    restart: unless-stopped
    profiles:
      - manual-login
    shm_size: 2gb
    ports:
      - "4444:4444"
      - "7900:7900"
    volumes:
      - ./linkedin_chrome_profile:/home/seluser/chrome-profile

